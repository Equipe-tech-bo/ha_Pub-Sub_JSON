sync:
  name: "Synchroniser les états"
  description: "Renvoie les états stockés dans le JSON vers les ESP via MQTT"
  fields:
    level1:
      name: "Niveau 1 (ex: BR)"
      description: "Premier niveau du chemin. Laisser vide pour tout synchroniser."
      required: false
      example: "BR"
      selector:
        text:

    level2:
      name: "Niveau 2 (ex: CRYPTE)"
      description: "Deuxième niveau du chemin."
      required: false
      example: "CRYPTE"
      selector:
        text:

    level3:
      name: "Niveau 3 (ex: SOCLE_MAGIE)"
      description: "Troisième niveau du chemin."
      required: false
      example: "SOCLE_MAGIE"
      selector:
        text:
        
start_ping:
  name: "Démarrer le PING périodique"
  description: "Envoie PING régulièrement à toutes les énigmes du JSON"
  fields:
    interval:
      name: "Intervalle (secondes)"
      description: "Temps entre chaque série de PINGs"
      required: false
      default: 30
      example: 30
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: s

stop_ping:
  name: "Arrêter le PING périodique"
  description: "Stoppe l'envoi périodique de PING"
